name: Flutter Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Slack Notification (Android)
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_CHANNEL: 'deploy'
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || (job.status == 'failure' && 'danger') || 'warning' }}
          SLACK_ICON_EMOJI: ':robot_face:'
          SLACK_TITLE: "App Build - Android ${{ job.status == 'success' && '✅ SUCCESS' || (job.status == 'failure' && '❌ FAILED') || '⚠️ CANCELLED/SKIPPED' }}"
          SLACK_MESSAGE: |
            *Status*: ${{ job.status }}
            *Branch*: ${{ github.ref_name }}
            *Commit*: ${{ github.sha }}
            *Workflow*: ${{ github.workflow }}
            *Run*: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SLACK_USERNAME: "Edumate CI Bot"

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Build iOS (No Codesign)
        run: flutter build ios --release --no-codesign

      - name: Slack Notification (iOS)
        if: always()
        uses: rtCamp/action-slack-notify@v2   # Thống nhất dùng rtCamp thay vì slackapi
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_CHANNEL: 'deploy'
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || (job.status == 'failure' && 'danger') || 'warning' }}
          SLACK_ICON_EMOJI: ':robot_face:'
          SLACK_TITLE: "App Build - iOS ${{ job.status == 'success' && '✅ SUCCESS' || (job.status == 'failure' && '❌ FAILED') || '⚠️ CANCELLED/SKIPPED' }}"
          SLACK_MESSAGE: |
            *Status*: ${{ job.status }}
            *Branch*: ${{ github.ref_name }}
            *Commit*: ${{ github.sha }}
            *Workflow*: ${{ github.workflow }}
            *Run*: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SLACK_USERNAME: "Edumate CI Bot"