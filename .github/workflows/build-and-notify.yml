name: Flutter Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Clean Flutter
        run: flutter clean

      - name: Install Dependencies
        run: flutter pub get

      - name: Create .env file
        run: |
          echo "FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}" >> .env
          echo "FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }}" >> .env
          echo "FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}" >> .env
          echo "FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}" >> .env
          echo "FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}" >> .env
          echo "FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}" >> .env
          echo "FIREBASE_MEASUREMENT_ID=${{ secrets.FIREBASE_MEASUREMENT_ID }}" >> .env

      - name: Build Web
        run: flutter build web --release

      - name: Slack Notification (Web)
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_CHANNEL: "deploy"
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || (job.status == 'failure' && 'danger') || 'warning' }}
          SLACK_ICON_EMOJI: ":robot_face:"
          SLACK_TITLE: "App Build - Web ${{ job.status == 'success' && '✅ SUCCESS' || (job.status == 'failure' && '❌ FAILED') || '⚠️ CANCELLED/SKIPPED' }}"
          SLACK_MESSAGE: |
            *Branch*: ${{ github.ref_name }}
            *Commit*: ${{ github.sha }}
            *Run*: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SLACK_USERNAME: "Edumate CI Bot"
          MSG_MINIMAL: true
          SLACKIFY_MARKDOWN: true

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Clean Flutter
        run: flutter clean

      - name: Install Dependencies
        run: flutter pub get

      - name: Create .env file
        run: |
          echo "FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}" >> .env
          echo "FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }}" >> .env
          echo "FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}" >> .env
          echo "FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}" >> .env
          echo "FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}" >> .env
          echo "FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}" >> .env
          echo "FIREBASE_MEASUREMENT_ID=${{ secrets.FIREBASE_MEASUREMENT_ID }}" >> .env

      - name: Build APK
        run: flutter build apk --release

      - name: Slack Notification (Android)
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_CHANNEL: "deploy"
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || (job.status == 'failure' && 'danger') || 'warning' }}
          SLACK_ICON_EMOJI: ":robot_face:"
          SLACK_TITLE: "App Build - Android ${{ job.status == 'success' && '✅ SUCCESS' || (job.status == 'failure' && '❌ FAILED') || '⚠️ CANCELLED/SKIPPED' }}"
          SLACK_MESSAGE: |
            *Branch*: ${{ github.ref_name }}
            *Commit*: ${{ github.sha }}
            *Run*: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SLACK_USERNAME: "Edumate CI Bot"
          MSG_MINIMAL: true
          SLACKIFY_MARKDOWN: true
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Clean Flutter
        run: flutter clean

      - name: Install Dependencies
        run: flutter pub get

      - name: Create .env file
        run: |
          echo "FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}" >> .env
          echo "FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }}" >> .env
          echo "FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}" >> .env
          echo "FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}" >> .env
          echo "FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}" >> .env
          echo "FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}" >> .env
          echo "FIREBASE_MEASUREMENT_ID=${{ secrets.FIREBASE_MEASUREMENT_ID }}" >> .env

      - name: Build iOS (No Codesign)
        run: flutter build ios --release --no-codesign

  notify-ios:
    name: Notify iOS Build Status
    needs: build-ios
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Slack Notification (iOS)
        uses: rtCamp/action-slack-notify@v2 # Thống nhất dùng rtCamp thay vì slackapi
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_CHANNEL: "deploy"
          SLACK_COLOR: ${{ needs.build-ios.result == 'success' && 'good' || (needs.build-ios.result == 'failure' && 'danger') || 'warning' }}
          SLACK_ICON_EMOJI: ":robot_face:"
          SLACK_TITLE: "App Build - iOS ${{ needs.build-ios.result == 'success' && '✅ SUCCESS' || (needs.build-ios.result == 'failure' && '❌ FAILED') || '⚠️ CANCELLED/SKIPPED' }}"
          SLACK_MESSAGE: |
            *Branch*: ${{ github.ref_name }}
            *Commit*: ${{ github.sha }}
            *Run*: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SLACK_USERNAME: "Edumate CI Bot"
          MSG_MINIMAL: true
          SLACKIFY_MARKDOWN: true